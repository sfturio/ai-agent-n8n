<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agente Chat</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="shell">
        <div class="topbar">
          <div class="brand">
            <div class="logo"></div>
            <div>
              <div><strong>Agente Chat</strong></div>
              <div style="opacity:.7;font-size:12px;">Conectado ao backend</div>
            </div>
          </div>
          <div class="status"><span class="dot"></span><span>Online</span></div>
        </div>

        <div id="chat" class="chat"></div>

        <form id="form" class="composer">
          <input id="input" placeholder="Digite sua mensagem..." autocomplete="off" />
          <button type="submit">Enviar</button>
        </form>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
