<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agente Chat</title>

  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="wrap">

    <div class="shell">

      <div class="topbar">
        <div class="brand">
          <div class="logo"></div>

          <div class="title">
            <h1>Agente Chat</h1>
            <p>Conectado ao backend</p>
          </div>
        </div>

        <div class="status">
          <div class="dot"></div>
          Online
        </div>
      </div>

      <div id="chat" class="chat"></div>

      <div class="composer">

        <input
          id="input"
          placeholder="Digite sua mensagem..."
        />

        <button id="send">
          Enviar
        </button>

      </div>

    </div>

  </div>

  <script src="./app.js"></script>

</body>
</html>
